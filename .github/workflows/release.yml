name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: bun-darwin-arm64
            suffix: darwin-arm64
          - runner: macos-13
            target: bun-darwin-x64
            suffix: darwin-x64
          - runner: ubuntu-24.04-arm
            target: bun-linux-arm64
            suffix: linux-arm64
          - runner: ubuntu-latest
            target: bun-linux-x64
            suffix: linux-x64

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release artifacts
        env:
          OPEN_SESSION_VERSION: ${{ github.ref_name }}
          OPEN_SESSION_TARGET: ${{ matrix.target }}
          OPEN_SESSION_SUFFIX: ${{ matrix.suffix }}
        run: |
          OPEN_SESSION_VERSION="${OPEN_SESSION_VERSION#v}" bash scripts/build-release.sh

      - name: Verify binary smoke test
        run: |
          tar -xzf dist/release/opensession-v${GITHUB_REF_NAME#v}-${{ matrix.suffix }}.tar.gz -C dist/release
          dist/release/opensession --version

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.suffix }}
          path: |
            dist/release/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist/release
          sha256sum ./*.tar.gz > checksums.txt
          cp ../../scripts/install.sh ./install.sh
          chmod +x ./install.sh

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/*.tar.gz
            dist/release/checksums.txt
            dist/release/install.sh
